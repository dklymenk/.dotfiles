set -g focus-events on

# remove escape delay to make tmux bearable with vim
set -sg escape-time 0

# this is supposed to fix some warnings
#set -g default-terminal "screen-256color"
# true colours support
#set -ga terminal-overrides ",*256col*:Tc"
#set -ga terminal-overrides ",st-256color:Tc"
#set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours - needs tmux-3.0
#set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# change prefix to C-a
set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# refresh tmux configuration
unbind r
bind r source-file ~/.tmux.conf

# pane resize with vim keys
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# alternative Zoom keybinding
bind -r m resize-pane -Z

# enable mouse
set -g mouse on

# vim movements in copy mode
setw -g mode-keys vi
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# keybinds to open windows and panes in curent folder
#bind c new-window -c "#{pane_current_path}"
#bind '"' split-window -c "#{pane_current_path}"
#bind % split-window -h -c "#{pane_current_path}"

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
#set -g @plugin 'jimeh/tmux-themepack' # to configure tmux theme
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @resurrect-processes 'false'
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @continuum-restore 'on'

#set -g @themepack 'powerline/default/cyan' # use this theme for tmux

#set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
#set -g @continuum-restore 'on' # enable tmux-continuum functionality

set -g @plugin 'tmux-plugins/tmux-urlview'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
